name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build, init DB, and run tests
        run: |
          set -e

          git submodule update --init --recursive

          # IMPORTANT: start clean every run (fixes "mpaa_rating already exists")
          docker compose down -v || true

          docker compose up -d --build

          # wait for postgres
          for i in {1..60}; do
            if docker compose exec -T pg pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres..."
            sleep 1
          done

          # create DB (ignore if it already exists)
          docker compose exec -T pg psql -U postgres -d postgres -c "CREATE DATABASE pagila;" || true

          # load schema + data
          docker compose exec -T pg psql -U postgres -d pagila -v ON_ERROR_STOP=1 -f /tmp/pagila-hw/pagila/pagila-schema.sql
          docker compose exec -T pg psql -U postgres -d pagila -v ON_ERROR_STOP=1 -f /tmp/pagila-hw/pagila/pagila-data.sql

          # run tests
          docker compose exec -T pg ./run_tests.sh
